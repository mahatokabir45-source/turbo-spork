<!DOCTYPE html>
<html>
<head>
  <title>Study Planner</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }
    .box {
      background: white;
      padding: 20px;
      margin: 50px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>📚 Study Planner</h2>
  
  <label>Total Study Hours:</label><br>
  <input type="number" id="hours" placeholder="Enter hours"><br>
  
  <button onclick="generatePlan()">Generate Plan</button>
  
  <h3>📅 Your Plan:</h3>
  <div id="output"></div>
</div>

<script>
function generatePlan() {
  let hours = document.getElementById("hours").value;

  if (hours <= 0) {
    alert("Enter valid hours");
    return;
  }

  // Weight system (hard subjects get more time)
  let subjects = {
    "Account": 0.25,
    "Economics": 0.20,
    "Finance": 0.20,
    "English": 0.15,
    "Nepali": 0.10,
    "Samajik": 0.10
  };

  let output = "";

  for (let sub in subjects) {
    let time = (hours * subjects[sub]).toFixed(2);
    output += `<p><b>${sub}</b>: ${time} hrs</p>`;
  }

  document.getElementById("output").innerHTML = output;
}
</script>

</body>
</html>
